<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — Respirfacile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #F5F0E8 0%, #EBE6DB 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #2D5016;
    }

    .container {
      max-width: 400px;
      text-align: center;
      background: white;
      border-radius: 32px;
      padding: 48px 24px;
      box-shadow: 0 4px 16px rgba(45, 80, 22, 0.08);
      border: 1px solid rgba(45, 80, 22, 0.1);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2D5016;
    }

    p {
      font-size: 15px;
      color: #5D7D4A;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    button {
      background-color: #2D5016;
      color: #F5F0E8;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(45, 80, 22, 0.15);
    }

    button:hover {
      background-color: #234010;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(45, 80, 22, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .note {
      font-size: 13px;
      color: #8B9B78;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #EBE6DB;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📶</span>
    <h1>Vous êtes hors ligne</h1>
    <p>Vos exercices récents restent accessibles dans l'application.</p>
    <button onclick="window.location.reload()">Réessayer</button>
    <p class="note">Reconnectez-vous à Internet et réessayez.</p>
  </div>
</body>
</html>
